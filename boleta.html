<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ITM - Boleta de Evaluación</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: #e0e0e0;
            padding: 20px;
        }
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .firma-area { display: none !important; }
            .btn { display: none !important; }
        }
        .boleta-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .membrete {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #d4af37;
        }
        .membrete h1 {
            font-size: 1.5rem;
            color: #0a2f6c;
            margin-bottom: 5px;
        }
        .membrete .clave, .membrete .ciclo {
            font-size: 0.8rem;
            color: #666;
        }
        .datos-alumno {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .datos-alumno p {
            margin: 5px 0;
            font-size: 0.9rem;
        }
        .datos-alumno strong {
            color: #0a2f6c;
        }
        .periodo-block {
            margin: 20px;
            page-break-inside: avoid;
        }
        .periodo-titulo {
            background: #f0e8d8;
            padding: 8px 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0a2f6c;
            border: 1px solid #000;
            border-bottom: none;
        }
        .periodo-tabla {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .periodo-tabla th, .periodo-tabla td {
            border: 1px solid #000;
            padding: 8px 10px;
            vertical-align: top;
        }
        .periodo-tabla th {
            background: #f0e8d8;
            font-weight: bold;
            text-align: left;
        }
        .seccion-titulo {
            background: #e8e0d0;
            font-weight: bold;
            text-align: center;
        }
        .seccion-titulo td {
            background: #e8e0d0;
            font-weight: bold;
            text-align: center;
        }
        .campo-label {
            font-weight: bold;
            width: 280px;
            background: #faf8f0;
        }
        .firmas-final {
            margin: 20px;
            border-top: 2px dashed #ccc;
            padding-top: 20px;
        }
        .firmas-final h3 {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            color: #0a2f6c;
        }
        .firma-item {
            display: inline-block;
            width: 32%;
            text-align: center;
            vertical-align: top;
        }
        .firma-img {
            max-width: 150px;
            max-height: 70px;
            border: 1px solid #ddd;
            margin-top: 5px;
        }
        .maestra-firma {
            text-align: right;
            margin: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }
        .firma-area {
            border: 2px dashed #d4af37;
            border-radius: 8px;
            background: white;
            margin: 20px;
            padding: 15px;
        }
        canvas {
            width: 100%;
            height: 180px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: block;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin: 5px;
        }
        .btn-primary { background: #d4af37; color: #0a2f6c; }
        .btn-secondary { background: #6c757d; color: white; }
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; text-align: center; margin: 15px; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; text-align: center; margin: 15px; }
        .form-group { margin: 15px 0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        @media (max-width: 768px) {
            .firma-item { width: 100%; margin: 10px 0; }
            .campo-label { width: 180px; }
        }
    </style>
</head>
<body>
    <div class="boleta-container">
        <div id="contenido-boleta"></div>
    </div>

    <script>
        let evaluacionActual = null;
        let alumnoActual = null;
        let periodoFirma = null;

        async function cargarBoleta() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get("token");
            const alumnoId = urlParams.get("alumno");
            
            await cargarDatos();
            
            if (token) {
                for (const e of evaluaciones) {
                    for (const p of periodos) {
                        if (e.periodos[p.clave]?.token === token) {
                            evaluacionActual = e;
                            periodoFirma = p.clave;
                            break;
                        }
                    }
                    if (evaluacionActual) break;
                }
                
                if (!evaluacionActual) {
                    mostrarError("El enlace no es válido o ya expiró");
                    return;
                }
                
                alumnoActual = alumnos.find(a => a.id === evaluacionActual.alumno_id);
                if (!alumnoActual) {
                    mostrarError("No se encontró información del alumno");
                    return;
                }
                
                const periodoData = evaluacionActual.periodos[periodoFirma];
                if (periodoData?.firmada) {
                    mostrarBoletaCompleta(true);
                } else {
                    mostrarFormularioFirma();
                }
            } 
            else if (alumnoId) {
                evaluacionActual = evaluaciones.find(e => e.alumno_id === alumnoId);
                alumnoActual = alumnos.find(a => a.id === alumnoId);
                if (!evaluacionActual || !alumnoActual) {
                    mostrarError("No se encontró la boleta del alumno");
                    return;
                }
                mostrarBoletaCompleta(false);
            }
            else {
                const alumnoSession = sessionStorage.getItem("alumnoActual");
                const evaluacionSession = sessionStorage.getItem("evaluacionActual");
                if (alumnoSession && evaluacionSession) {
                    alumnoActual = JSON.parse(alumnoSession);
                    evaluacionActual = JSON.parse(evaluacionSession);
                    mostrarBoletaCompleta(false);
                } else {
                    mostrarError("No se pudo cargar la boleta");
                }
            }
        }

        function mostrarError(mensaje) {
            document.getElementById("contenido-boleta").innerHTML = `
                <div class="error">❌ ${mensaje}<br><br><button class="btn btn-primary" onclick="window.location.href='index.html'">Volver al inicio</button></div>
            `;
        }

        function generarBloquePeriodo(periodo, periodoData) {
            let html = `
                <div class="periodo-block">
                    <div class="periodo-titulo">${periodo.nombre}</div>
                    <table class="periodo-tabla">
            `;
            
            html += `<tr class="seccion-titulo"><td colspan="2"><strong>CAMPOS DE FORMACIÓN ACADÉMICA</strong></td></tr>`;
            camposAcademicos.forEach(campo => {
                const valor = periodoData?.campos?.[campo] || "_________________________";
                html += `<tr><td class="campo-label">${campo}</td><td>${valor}</td></tr>`;
            });
            
            html += `<tr class="seccion-titulo"><td colspan="2"><strong>ÁREAS DE DESARROLLO PERSONAL Y SOCIAL</strong></td></tr>`;
            areasDesarrollo.forEach(campo => {
                const valor = periodoData?.campos?.[campo] || "_________________________";
                html += `<tr><td class="campo-label">${campo}</td><td>${valor}</td></tr>`;
            });
            
            html += `<tr class="seccion-titulo"><td colspan="2"><strong>AUTONOMÍA CURRICULAR</strong></td></tr>`;
            autonomiaCurricular.forEach(campo => {
                const valor = periodoData?.campos?.[campo] || "_________________________";
                html += `<tr><td class="campo-label">${campo}</td><td>${valor}</td></tr>`;
            });
            
            const recomendaciones = periodoData?.recomendaciones || "_________________________";
            html += `<tr class="seccion-titulo"><td colspan="2"><strong>RECOMENDACIONES</strong></td></tr>`;
            html += `<tr><td class="campo-label">Recomendaciones Generales</td><td>${recomendaciones}</td></tr>`;
            
            html += `</table></div>`;
            return html;
        }

        function generarBoletaCompleta() {
            let html = '';
            periodos.forEach(periodo => {
                const periodoData = evaluacionActual?.periodos[periodo.clave];
                html += generarBloquePeriodo(periodo, periodoData);
            });
            return html;
        }

        function generarFirmas() {
            let html = `<div class="firmas-final"><h3>✍️ FIRMA DE LA MADRE, PADRE O TUTOR</h3><div>`;
            periodos.forEach(p => {
                const pData = evaluacionActual?.periodos[p.clave];
                if (pData?.firmada) {
                    html += `<div class="firma-item"><strong>MOMENTO ${p.momento}</strong><br>✅ Firmado<br><strong>${pData.firmaNombre}</strong><br>${new Date(pData.fechaFirma).toLocaleDateString()}${pData.firma ? `<br><img src="${pData.firma}" class="firma-img">` : ""}</div>`;
                } else {
                    html += `<div class="firma-item"><strong>MOMENTO ${p.momento}</strong><br>_________________________<br><span style="color:#999;">Pendiente de firma</span></div>`;
                }
            });
            html += `</div></div>`;
            return html;
        }

        function mostrarBoletaCompleta(yaFirmada = false) {
            const grupo = grupos.find(g => g.id === alumnoActual.grupo_id);
            const maestra = usuarios.find(u => u.rol === "maestra" && u.grupo_id === alumnoActual.grupo_id);
            
            let html = `
                <div class="membrete">
                    <h1>${configuracion.nombre || "INSTITUTO TERESITA MARTÍN"}</h1>
                    <div class="clave">CLAVE: ${configuracion.clave || "20PJN02791"}</div>
                    <div class="ciclo">REPORTES DE EVALUACIÓN - CICLO ESCOLAR ${configuracion.ciclo || "2025-2026"}</div>
                </div>
                <div class="datos-alumno">
                    <p><strong>Nombre del Alumno:</strong> ${alumnoActual.nombre}</p>
                    <p><strong>CURP:</strong> ${alumnoActual.curp || "No registrada"} | <strong>Grado y Grupo:</strong> ${alumnoActual.grado} - ${grupo ? grupo.grupo : ""}</p>
                    <p><strong>Tutor:</strong> ${alumnoActual.tutor} | <strong>Teléfono:</strong> ${alumnoActual.telefono || "No registrado"}</p>
                </div>
                <div style="padding:0 0 20px 0;">
                    ${generarBoletaCompleta()}
                    ${generarFirmas()}
                    <div class="maestra-firma">
                        <p><strong>MAESTRA DE GRUPO</strong></p>
                        <p>${maestra?.nombre || "_________________________"}</p>
                        <p>Nombre y Firma</p>
                    </div>
                </div>
            `;
            
            if (yaFirmada) {
                const periodoData = evaluacionActual.periodos[periodoFirma];
                const periodoNombre = periodos.find(p => p.clave === periodoFirma)?.nombre;
                html += `<div class="no-print" style="text-align:center; margin-top:20px; padding:15px;">
                    <div class="success">✅ Este periodo (${periodoNombre}) ya fue firmado anteriormente<br>Firmado por: ${periodoData.firmaNombre} - ${new Date(periodoData.fechaFirma).toLocaleString()}</div>
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
                    <button class="btn btn-secondary" onclick="window.close()">Cerrar</button>
                </div>`;
            } else {
                html += `<div class="no-print" style="text-align:center; margin-top:20px; padding:15px;">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
                    <button class="btn btn-secondary" onclick="window.close()">Cerrar</button>
                </div>`;
            }
            
            document.getElementById("contenido-boleta").innerHTML = html;
        }

        function mostrarFormularioFirma() {
            const periodoData = evaluacionActual.periodos[periodoFirma];
            const periodoActual = periodos.find(p => p.clave === periodoFirma);
            const grupo = grupos.find(g => g.id === alumnoActual.grupo_id);
            const maestra = usuarios.find(u => u.rol === "maestra" && u.grupo_id === alumnoActual.grupo_id);
            
            let html = `
                <div class="membrete">
                    <h1>${configuracion.nombre || "INSTITUTO TERESITA MARTÍN"}</h1>
                    <div class="clave">CLAVE: ${configuracion.clave || "20PJN02791"}</div>
                    <div class="ciclo">REPORTES DE EVALUACIÓN - CICLO ESCOLAR ${configuracion.ciclo || "2025-2026"}</div>
                </div>
                <div class="datos-alumno">
                    <p><strong>Nombre del Alumno:</strong> ${alumnoActual.nombre}</p>
                    <p><strong>CURP:</strong> ${alumnoActual.curp || "No registrada"} | <strong>Grado y Grupo:</strong> ${alumnoActual.grado} - ${grupo ? grupo.grupo : ""}</p>
                    <p><strong>Tutor:</strong> ${alumnoActual.tutor}</p>
                </div>
                <div style="padding:0 0 20px 0;">
                    ${generarBoletaCompleta()}
                    ${generarFirmas()}
                    <div class="maestra-firma">
                        <p><strong>MAESTRA DE GRUPO</strong></p>
                        <p>${maestra?.nombre || "_________________________"}</p>
                        <p>Nombre y Firma</p>
                    </div>
                </div>
                <div class="no-print firma-area">
                    <div style="background:#f0e8d8; padding:10px; border-radius:5px; margin-bottom:10px; text-align:center;">
                        <strong>✍️ Firmando ${periodoActual.nombre} - MOMENTO ${periodoActual.momento}</strong>
                    </div>
                    <canvas id="firmaCanvas" width="500" height="180" style="width:100%; height:180px; background:white; border:1px solid #ccc; border-radius:5px;"></canvas>
                    <div class="form-group">
                        <label>📝 Nombre completo del tutor</label>
                        <input type="text" id="nombreFirma" placeholder="Escribe tu nombre completo">
                    </div>
                    <div style="text-align:center;">
                        <button class="btn btn-secondary" onclick="limpiarFirma()">🗑️ Borrar firma</button>
                        <button class="btn btn-primary" onclick="guardarFirma()">✅ Firmar ${periodoActual.nombre}</button>
                    </div>
                </div>
                <div class="no-print" style="text-align:center; margin-top:10px; padding-bottom:15px;">
                    <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimir versión actual</button>
                </div>
            `;
            
            document.getElementById("contenido-boleta").innerHTML = html;
            setTimeout(() => configurarCanvas(), 100);
        }

        let canvas, ctx, drawing = false;

        function configurarCanvas() {
            canvas = document.getElementById("firmaCanvas");
            if (!canvas) return;
            ctx = canvas.getContext("2d");
            
            function resizeCanvas() {
                const container = canvas.parentElement;
                const width = container.clientWidth - 4;
                canvas.width = width;
                canvas.height = 180;
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 2;
                ctx.lineCap = "round";
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);
            
            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            }
            
            function startDrawing(e) { drawing = true; e.preventDefault(); const { x, y } = getCoordinates(e); ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y); ctx.stroke(); }
            function draw(e) { if (!drawing) return; e.preventDefault(); const { x, y } = getCoordinates(e); ctx.lineTo(x, y); ctx.stroke(); }
            function stopDrawing() { drawing = false; ctx.beginPath(); }
            
            canvas.addEventListener("mousedown", startDrawing);
            canvas.addEventListener("mousemove", draw);
            canvas.addEventListener("mouseup", stopDrawing);
            canvas.addEventListener("touchstart", startDrawing);
            canvas.addEventListener("touchmove", draw);
            canvas.addEventListener("touchend", stopDrawing);
        }

        function limpiarFirma() {
            if (ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        async function guardarFirma() {
            const nombre = document.getElementById("nombreFirma").value;
            if (!nombre.trim()) { alert("Por favor, escribe tu nombre completo"); return; }
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let tieneFirma = false;
            for (let i = 3; i < imageData.data.length; i += 4) {
                if (imageData.data[i] !== 0) { tieneFirma = true; break; }
            }
            if (!tieneFirma) { alert("Por favor, firma en el área designada"); return; }
            
            const firmaData = canvas.toDataURL();
            const periodoData = evaluacionActual.periodos[periodoFirma];
            periodoData.firmada = true;
            periodoData.firma = firmaData;
            periodoData.firmaNombre = nombre;
            periodoData.fechaFirma = new Date().toISOString();
            
            await guardarEvaluacion(evaluacionActual);
            mostrarBoletaCompleta(true);
        }

        cargarBoleta();
    </script>
</body>
</html>
